name: Brain Pipeline — Score & Deploy

# Runs Mon-Fri after the last data refresh (4:30 PM ET = 21:30 UTC)
# Daily: fetch fresh data → collect prices → ingest + enrich + score + export
# Monday (or manual): + full feature analysis + ML walk-forward
on:
  schedule:
    - cron: '0 22 * * 1-5'  # Mon-Fri 10:00 PM UTC (5:00 PM ET)
  workflow_dispatch:          # manual trigger

jobs:
  brain:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit brain export files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore signal database from cache
        uses: actions/cache@v4
        with:
          path: data/atlas_signals.db
          key: atlas-db-${{ github.run_number }}
          restore-keys: atlas-db-

      - name: Restore ML model cache
        uses: actions/cache@v4
        with:
          path: data/models_cache.pkl
          key: atlas-models-${{ github.run_number }}
          restore-keys: atlas-models-

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests scikit-learn lightgbm scipy

      - name: Fetch fresh data feeds
        env:
          QUIVER_KEY: ${{ secrets.QUIVER_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          python3 scripts/fetch_data.py
          if [ -f scripts/fetch_bills.py ]; then
            python3 scripts/fetch_bills.py || echo "Bill fetch skipped (no API key or error)"
          fi
          if [ -f scripts/fetch_13f.py ]; then
            python3 scripts/fetch_13f.py || echo "13F fetch skipped (error)"
          fi

      - name: Collect prices for signal tickers
        run: python -m backtest.collect_prices || echo "Price collection had errors (non-fatal)"

      - name: Backfill features (enrich new signals before scoring)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python -m backtest.learning_engine --backfill || echo "Backfill had errors (non-fatal)"

      - name: Run daily pipeline (ingest + enrich + score + export)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: python -m backtest.learning_engine --daily

      - name: Run weekly analysis (Mondays + manual triggers)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running full analysis..."
            python -m backtest.learning_engine --analyze
          else
            echo "Skipping analysis (not Monday, not manual)"
          fi

      - name: Evaluate candidate features (Mondays + manual triggers)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Evaluating candidate features..."
            python -m backtest.learning_engine --eval-features \
              committee_overlap earnings_surprise news_sentiment_30d || echo "Feature eval had errors (non-fatal)"
          else
            echo "Skipping feature eval (not Monday, not manual)"
          fi

      - name: Generate analyst report (Mondays + manual triggers)
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Generating analyst report..."
            python -m backtest.learning_engine --report || echo "Report generation had errors (non-fatal)"
          else
            echo "Skipping report (not Monday, not manual)"
          fi

      - name: Run self-check
        run: python -m backtest.learning_engine --self-check

      - name: Print summary
        run: python -m backtest.learning_engine --summary

      - name: Commit brain export files
        run: |
          git config --global user.name  'ATLAS Brain Bot'
          git config --global user.email 'bot@atlasiq.io'
          git add data/brain_signals.json data/brain_stats.json data/brain_health.json
          MISSING=""
          for f in data/optimal_weights.json data/congress_feed.json data/edgar_feed.json \
                   data/market_data.json data/bills_feed.json data/13f_feed.json \
                   data/feature_candidates.json data/analyst_report.json \
                   data/signal_hypotheses.json data/signal_intelligence.json \
                   data/portfolio_stats.json data/dashboard.html; do
            if [ -f "$f" ]; then
              git add "$f"
            else
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing export files:$MISSING"
          fi
          git diff --staged --quiet || git commit -m "chore(brain): update scores $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Notify brain health on success
        if: success()
        run: |
          NOTIFY=$(python3 -c "
          import json, os
          parts = []

          # Brain status
          if os.path.exists('data/brain_health.json'):
              h = json.load(open('data/brain_health.json'))
              parts.append(f\"Brain: {h.get('overall_status', 'unknown').upper()}\")

              # Data quality checks
              checks = h.get('checks', {})
              critical = [k for k, v in checks.items() if v.get('status') == 'critical']
              if critical:
                  parts.append(f\"CRITICAL: {', '.join(critical)}\")

              # Strategy readiness
              sr = checks.get('strategy_readiness', {})
              if sr.get('readiness'):
                  parts.append(f\"Trades: {sr.get('ready', '?')}/{sr.get('eligible', '?')}\")

              # Residual patterns
              res = h.get('residuals', {}).get('summary', {})
              if res.get('n_false_positives'):
                  parts.append(f\"FP:{res['n_false_positives']} FN:{res.get('n_false_negatives',0)}\")

          # Feature recs
          if os.path.exists('data/feature_candidates.json'):
              d = json.load(open('data/feature_candidates.json'))
              recs = [n for n, i in d.get('candidates', {}).items()
                      if i.get('recommendation') == 'ADD' and i.get('ic_delta', 0) > 0.005]
              if recs: parts.append(f\"Recs: {', '.join(recs)}\")

          # Hypotheses
          if os.path.exists('data/signal_hypotheses.json'):
              sh = json.load(open('data/signal_hypotheses.json'))
              n = len(sh.get('high_residual_tickers',[])) + len(sh.get('feature_interactions',[])) + len(sh.get('regime_gaps',[]))
              if n: parts.append(f'{n} hypotheses')

          print('ATLAS daily: ' + ' | '.join(parts) if parts else 'ATLAS daily complete')
          " 2>/dev/null || echo "ATLAS daily complete")
          curl -s -d "$NOTIFY" \
            https://ntfy.sh/atlas-${{ secrets.NTFY_CHANNEL }} || true

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -d "ATLAS pipeline failed: ${{ github.workflow }} at $(date -u)" \
            https://ntfy.sh/atlas-${{ secrets.NTFY_CHANNEL }} || true
